<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniBite | Admin Panel</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    .admin-layout { display: flex; min-height: 100vh; }
    .admin-sidebar {
      width: 260px;
      background: #0f172a;
      color: #f8fafc;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .admin-sidebar .sidebar-brand { font-size: 1.4rem; font-weight: 800; margin-bottom: 32px; color: #f8fafc; }
    .admin-sidebar .sidebar-brand span { color: var(--primary); }
    .admin-sidebar-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      color: #94a3b8;
      transition: var(--transition);
      cursor: pointer;
      font-size: 0.9rem;
    }
    .admin-sidebar-item:hover { background: rgba(255,255,255,0.05); color: #f8fafc; }
    .admin-sidebar-item.active { background: rgba(255, 75, 75, 0.15); color: var(--primary); }
    .admin-sidebar-item i { font-size: 1.2rem; }
    .admin-main { flex: 1; padding: 32px; background: var(--bg-base); overflow-y: auto; }
    .stat-card-premium {
      background: var(--bg-surface);
      border-radius: var(--radius-md);
      padding: 24px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      position: relative;
      overflow: hidden;
    }
    .stat-card-premium::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
    }
    .stat-card-premium.revenue::before { background: linear-gradient(90deg, var(--primary), #ff7a7a); }
    .stat-card-premium.orders::before { background: linear-gradient(90deg, #3b82f6, #93c5fd); }
    .stat-card-premium.shops::before { background: linear-gradient(90deg, var(--success), #6ee7b7); }
    .stat-card-premium.students::before { background: linear-gradient(90deg, #8b5cf6, #c4b5fd); }
    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      margin-bottom: 16px;
    }
    .stat-icon.revenue { background: var(--primary-light); color: var(--primary); }
    .stat-icon.orders { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
    .stat-icon.shops { background: rgba(16, 185, 129, 0.1); color: var(--success); }
    .stat-icon.students { background: rgba(139, 92, 246, 0.1); color: #8b5cf6; }
    .stat-number { font-size: 2rem; font-weight: 800; margin-bottom: 4px; }
    .data-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }
    .data-table th {
      text-align: left;
      padding: 12px 16px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      background: var(--bg-base);
      border-bottom: 1px solid var(--border);
    }
    .data-table td {
      padding: 14px 16px;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--border);
    }
    .data-table tbody tr { transition: var(--transition); }
    .data-table tbody tr:hover { background: var(--bg-base); }
    .shop-row-avatar {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      object-fit: cover;
    }
    .trend-up { color: var(--success); font-weight: 700; font-size: 0.8rem; }
    @media (max-width: 768px) {
      .admin-sidebar { display: none; }
      .admin-main { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-brand">Uni<span>Bite</span> Admin</div>
      <div class="admin-sidebar-item active"><i class="ph ph-chart-pie-slice"></i> Overview</div>
      <div class="admin-sidebar-item"><i class="ph ph-storefront"></i> Shops</div>
      <div class="admin-sidebar-item"><i class="ph ph-receipt"></i> Transactions</div>
      <div class="admin-sidebar-item"><i class="ph ph-users"></i> Students</div>
      <div class="admin-sidebar-item"><i class="ph ph-gear"></i> Settings</div>
      <div style="flex: 1;"></div>
      <a href="index.html" class="admin-sidebar-item" style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 16px;">
        <i class="ph ph-arrow-left"></i> Back to App
      </a>
    </aside>

    <main class="admin-main">
      <div class="flex-row justify-between align-center mb-lg">
        <div>
          <h1 class="text-title">Campus Overview</h1>
          <p class="text-small text-muted">Real-time analytics across all canteens</p>
        </div>
        <div class="flex-row gap-sm">
          <span class="badge success animate-pulse-ring"><i class="ph-fill ph-circle" style="font-size: 8px;"></i> Live</span>
          <button class="btn-secondary" onclick="renderAdminStats()" style="padding: 8px 16px;"><i class="ph ph-arrows-clockwise"></i> Refresh</button>
        </div>
      </div>

      <div class="dashboard-grid mb-lg" id="stats-grid">
        <!-- Stats injected -->
      </div>

      <h2 class="text-body font-bold mb-md" style="margin-top: 32px;">Shop Performance</h2>
      <div class="card mb-lg" style="padding: 0; overflow: hidden;">
        <table class="data-table">
          <thead>
            <tr>
              <th>Shop</th>
              <th>Type</th>
              <th>Status</th>
              <th>Orders</th>
              <th>Revenue</th>
              <th>Rating</th>
            </tr>
          </thead>
          <tbody id="shops-table-body">
            <!-- Rows injected -->
          </tbody>
        </table>
      </div>

      <h2 class="text-body font-bold mb-md">Recent Transactions</h2>
      <div class="card" style="padding: 0; overflow: hidden;">
        <table class="data-table">
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Shop</th>
              <th>Student</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="transactions-body">
            <!-- Rows injected -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderAdminStats();
      setInterval(renderAdminStats, 5000);
    });

    window.renderAdminStats = () => {
      const allOrders = orderManager.getOrders();
      const totalRevenue = allOrders.reduce((sum, o) => sum + o.totalAmount, 0);
      const activeShops = MOCK_SHOPS.filter(s => s.isOpen).length;
      const completedOrders = allOrders.filter(o => o.status === 'Collected').length;

      // Stats grid
      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card-premium revenue">
          <div class="stat-icon revenue"><i class="ph ph-currency-inr"></i></div>
          <div class="stat-number">₹${totalRevenue.toLocaleString()}</div>
          <p class="text-small text-muted">Total Revenue</p>
          <p class="trend-up" style="margin-top: 8px;">↑ +12% today</p>
        </div>
        <div class="stat-card-premium orders">
          <div class="stat-icon orders"><i class="ph ph-receipt"></i></div>
          <div class="stat-number">${allOrders.length}</div>
          <p class="text-small text-muted">Total Orders</p>
          <p class="trend-up" style="margin-top: 8px;">↑ +${allOrders.length} today</p>
        </div>
        <div class="stat-card-premium shops">
          <div class="stat-icon shops"><i class="ph ph-storefront"></i></div>
          <div class="stat-number">${activeShops}/${MOCK_SHOPS.length}</div>
          <p class="text-small text-muted">Active Shops</p>
        </div>
        <div class="stat-card-premium students">
          <div class="stat-icon students"><i class="ph ph-graduation-cap"></i></div>
          <div class="stat-number">${new Set(allOrders.map(o => o.userId)).size || 0}</div>
          <p class="text-small text-muted">Unique Students</p>
        </div>
      `;

      // Shops table
      document.getElementById('shops-table-body').innerHTML = MOCK_SHOPS.map(shop => {
        const shopOrders = allOrders.filter(o => o.shopId === shop.id);
        const shopRev = shopOrders.reduce((s, o) => s + o.totalAmount, 0);
        return `
          <tr>
            <td>
              <div class="flex-row gap-sm align-center">
                <img src="${shop.imageUrl}" class="shop-row-avatar" alt="${shop.name}">
                <span class="font-bold">${shop.name}</span>
              </div>
            </td>
            <td class="text-muted">${shop.type}</td>
            <td>${shop.isOpen ? '<span class="badge success">Online</span>' : '<span class="badge warning">Offline</span>'}</td>
            <td class="font-bold">${shopOrders.length}</td>
            <td class="font-bold">₹${shopRev.toLocaleString()}</td>
            <td>
              <div class="flex-row gap-xs align-center" style="color: var(--warning);">
                <i class="ph-fill ph-star"></i> ${shop.rating.toFixed(1)}
              </div>
            </td>
          </tr>
        `;
      }).join('');

      // Transactions table
      const recentOrders = [...allOrders].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 15);
      if (recentOrders.length === 0) {
        document.getElementById('transactions-body').innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 40px; color: var(--text-muted);"><i class="ph ph-receipt" style="font-size: 2rem; display: block; margin-bottom: 8px;"></i>No transactions yet</td></tr>`;
      } else {
        document.getElementById('transactions-body').innerHTML = recentOrders.map(order => {
          const shopName = getShopById(order.shopId)?.name || 'Unknown';
          const timeAgo = Math.round((new Date() - new Date(order.createdAt)) / 60000);
          const timeStr = timeAgo === 0 ? 'Just now' : timeAgo + 'm ago';
          const statusClassMap = { Placed: 'status-placed', Preparing: 'status-preparing', Ready: 'status-ready', Collected: 'status-collected' };
          return `
            <tr>
              <td><span class="font-bold">#${order.id.slice(-6).toUpperCase()}</span></td>
              <td>${shopName}</td>
              <td>${order.userId}</td>
              <td class="font-bold">₹${order.totalAmount}</td>
              <td><span class="status-pill ${statusClassMap[order.status] || ''}">${order.status}</span></td>
              <td class="text-muted text-small">${timeStr}</td>
            </tr>
          `;
        }).join('');
      }
    };
  </script>
</body>
</html>
